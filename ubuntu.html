<p id="status"></p>
<script>
    // Define the logic in a function so it can be called anywhere
    async function launchVM() {
        const statusText = document.getElementById('status');
        statusText.innerText = "Launching VM, please wait...";
    
        try {
            const response = await fetch('https://ec2-18-219-58-159.us-east-2.compute.amazonaws.com/api/create?developer_id=loremgroupusllc&site_limit=999&delete_after=45');
            const data = await response.json();
    
            if (data.status === "success") {
                statusText.innerText = "VM Ready! Redirecting...";
                window.location.href = data.url; // Redirecting in the same tab is often better for user experience
            } else {
                statusText.innerText = "Error: " + data.detail;
            }
        } catch (error) {
            statusText.innerText = "Failed to connect to UBX API.";
        }
    }
    
    // Automatically trigger on page load
    window.addEventListener('load', launchVM);
    
    </script>
