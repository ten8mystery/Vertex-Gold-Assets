<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Embed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  overflow: hidden;
  background: black;
}

iframe {
  border: none;
  width: 100vw;
  height: 100vh;
  display: block;
}
</style>
</head>

<body>

<iframe id="gameFrame" allowfullscreen
allow="autoplay; fullscreen; camera; microphone; clipboard-write; web-share; accelerometer; gyroscope; magnetometer">
</iframe>

<script>
const params = window.location.search.substring(1); // everything after ?

if (params) {
  const targetURL = decodeURIComponent(params);
  document.getElementById("gameFrame").src =
    "/unlocker/embed.html#" + targetURL;
} else {
  document.body.innerHTML =
    "<h1 style='color:white;text-align:center;margin-top:40vh;font-family:sans-serif;'>No URL provided</h1>";
}
</script>

</body>
</html>
