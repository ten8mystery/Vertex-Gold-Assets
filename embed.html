<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Embed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  overflow: hidden;
  background: black;
}

iframe {
  border: none;
  width: 100vw;
  height: 100vh;
  display: block;
}
</style>
</head>

<body>

<iframe id="gameFrame" allowfullscreen
allow="autoplay; fullscreen; camera; microphone; clipboard-write; web-share; accelerometer; gyroscope; magnetometer">
</iframe>

<script>
let url =
  window.location.search.slice(1) ||   // ?example.com
  window.location.hash.slice(1);       // #example.com

if (!url) {
  document.body.innerHTML =
    "<h1 style='color:white;text-align:center;margin-top:40vh;font-family:sans-serif;'>If you see this text, I flowkirkenuinly broke the game  😭 Mb twin im fixing it </h1>";
} else {

  url = decodeURIComponent(url);

  // add https:// if missing
  if (!url.startsWith("http")) {
    url = "https://" + url;
  }

  document.getElementById("gameFrame").src = url;
}
</script>

</body>
</html>
