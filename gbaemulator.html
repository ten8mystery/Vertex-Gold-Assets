<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBA JS Player</title>
    <style>
        body { background: #111; color: #ddd; font-family: system-ui; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        #emulator-container { background: #252525; padding: 25px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.7); border: 1px solid #333; }
        canvas { background: #000; width: 480px; height: 320px; image-rendering: pixelated; border: 4px solid #000; border-radius: 4px; display: block; }
        .controls { margin-top: 20px; font-size: 13px; color: #888; text-align: center; line-height: 1.8; }
        kbd { background: #444; color: #fff; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        input[type="file"] { margin: 15px 0; border: 1px dashed #555; padding: 10px; width: 100%; box-sizing: border-box; cursor: pointer; }
        #msg { margin-bottom: 10px; color: #4CAF50; font-weight: bold; height: 1.2em; }
    </style>
</head>
<body>

<div id="emulator-container">
    <div id="msg">Ready. Load a .gba file.</div>
    <canvas id="screen" width="240" height="160"></canvas>
    
    <input type="file" id="rom-file" accept=".gba">
    
    <div class="controls">
        <kbd>Arrows</kbd> D-Pad | <kbd>Z</kbd> A | <kbd>X</kbd> B | <kbd>A</kbd> L | <kbd>S</kbd> R<br>
        <kbd>Enter</kbd> Start | <kbd>\ </kbd> Select
    </div>
</div>

<script src="https://cdn.jsdelivr.net/gh/adamschwartz/gba.js/dist/util.js"></script>
<script src="https://cdn.jsdelivr.net/gh/adamschwartz/gba.js/dist/gba.js"></script>

<script>
    const canvas = document.getElementById('screen');
    const msg = document.getElementById('msg');
    const romInput = document.getElementById('rom-file');

    // Initialize GBA engine
    let gba;
    try {
        gba = new GameBoyAdvance();
        gba.setCanvas(canvas);
        gba.logLevel = gba.LOG_ERROR;
    } catch (e) {
        msg.style.color = "red";
        msg.textContent = "Library failed to load.";
    }

    romInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        msg.textContent = "Loading " + file.name + "...";

        const reader = new FileReader();
        reader.onload = (event) => {
            // Convert file to ArrayBuffer and run
            gba.loadRomFromFile(file, (success) => {
                if (success) {
                    msg.textContent = "Running!";
                    gba.runAnimation();
                } else {
                    msg.style.color = "red";
                    msg.textContent = "Error: Invalid GBA file.";
                }
            });
        };
        reader.readAsArrayBuffer(file);
    });

    // Keyboard controls
    window.addEventListener("keydown", (e) => {
        if (!gba) return;
        const kp = gba.keypad;
        switch (e.key.toLowerCase()) {
            case "arrowup": kp.keydown(kp.UP); break;
            case "arrowdown": kp.keydown(kp.DOWN); break;
            case "arrowleft": kp.keydown(kp.LEFT); break;
            case "arrowright": kp.keydown(kp.RIGHT); break;
            case "z": kp.keydown(kp.A); break;
            case "x": kp.keydown(kp.B); break;
            case "a": kp.keydown(kp.L); break;
            case "s": kp.keydown(kp.R); break;
            case "enter": kp.keydown(kp.START); break;
            case "\\": kp.keydown(kp.SELECT); break;
        }
    });

    window.addEventListener("keyup", (e) => {
        if (!gba) return;
        const kp = gba.keypad;
        switch (e.key.toLowerCase()) {
            case "arrowup": kp.keyup(kp.UP); break;
            case "arrowdown": kp.keyup(kp.DOWN); break;
            case "arrowleft": kp.keyup(kp.LEFT); break;
            case "arrowright": kp.keyup(kp.RIGHT); break;
            case "z": kp.keyup(kp.A); break;
            case "x": kp.keyup(kp.B); break;
            case "a": kp.keyup(kp.L); break;
            case "s": kp.keyup(kp.R); break;
            case "enter": kp.keyup(kp.START); break;
            case "\\": kp.keyup(kp.SELECT); break;
        }
    });
</script>

</body>
</html>
