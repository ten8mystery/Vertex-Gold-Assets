<!DOCTYPE html>
<html>
<head>
    <title>GBA Web Emulator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body { background: #111; color: #eee; font-family: sans-serif; text-align: center; }
        #emulator { width: 640px; height: 480px; max-width: 90vw; margin: 20px auto; border: 2px solid #444; }
        .btn { background: #3a7bd5; color: white; padding: 12px 24px; border: none; cursor: pointer; border-radius: 4px; font-size: 16px; }
        #status { margin-top: 10px; color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

    <h2>GBA Single-File Player</h2>
    
    <div id="emulator">
        <div style="padding-top: 150px;">
            <input type="file" id="file" accept=".gba" style="display:none">
            <button class="btn" onclick="document.getElementById('file').click()">📂 Load GBA ROM</button>
            <p id="status">Waiting for file...</p>
        </div>
    </div>

    <script>
        document.getElementById('file').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('status').innerText = "Loading Engine...";

            // Configuration for EmulatorJS
            window.EJS_player = "#emulator";
            window.EJS_core = "gba"; 
            window.EJS_gameUrl = URL.createObjectURL(file); // Better than DataURL
            window.EJS_pathtodata = "https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/";

            // Load the actual loader script
            const script = document.createElement("script");
            script.src = "https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/loader.js";
            script.onload = () => {
                document.getElementById('status').innerText = "Engine Loaded!";
            };
            document.head.appendChild(script);
        };
    </script>
</body>
</html>
