<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GBA WASM Player</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #screen { background: #000; width: 480px; height: 320px; border: 8px solid #333; border-radius: 10px; image-rendering: pixelated; }
        .controls { margin-top: 20px; text-align: center; background: #222; padding: 15px; border-radius: 10px; }
        kbd { background: #444; padding: 3px 8px; border-radius: 4px; font-family: monospace; border-bottom: 2px solid #000; }
        #status { margin-bottom: 10px; color: #00ff00; }
        input { margin: 15px; }
    </style>
</head>
<body>

    <div id="status">Ready to Play</div>
    <canvas id="screen"></canvas>
    
    <input type="file" id="upload" accept=".gba">

    <div class="controls">
        <kbd>Arrows</kbd> Move | <kbd>X</kbd> A | <kbd>Z</kbd> B | <kbd>A</kbd> L | <kbd>S</kbd> R<br>
        <kbd>Enter</kbd> Start | <kbd>Shift</kbd> Select
    </div>

    <script src="https://cdn.jsdelivr.net/gh/taisel/IodineGBA@master/IodineGBA/core/Cartridge.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/taisel/IodineGBA@master/IodineGBA/core/CPU.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/taisel/IodineGBA@master/IodineGBA/core/Graphics.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/taisel/IodineGBA@master/IodineGBA/core/Memory.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/taisel/IodineGBA@master/IodineGBA/core/Sound.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/taisel/IodineGBA@master/IodineGBA/core/Timer.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/taisel/IodineGBA@master/IodineGBA/core/Emulator.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/taisel/IodineGBA@master/IodineGBA/core/Joypad.js"></script>

    <script>
        // Check if scripts loaded
        if (typeof IodineGBA === 'undefined') {
            document.getElementById('status').innerText = "Error: Core Library Blocked. Try running from a web server.";
            document.getElementById('status').style.color = "red";
        }

        const canvas = document.getElementById('screen');
        const gba = new IodineGBA();
        gba.attachCanvas(canvas);

        document.getElementById('upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function() {
                const romData = new Uint8Array(this.result);
                gba.loadROM(romData);
                gba.play();
                document.getElementById('status').innerText = "Running: " + file.name;
            };
            reader.readAsArrayBuffer(file);
        });

        // Mapping Keys
        const keys = {
            38: 0, 40: 1, 37: 2, 39: 3, // Up Down Left Right
            88: 4, 90: 5, 83: 6, 65: 7, // X(A) Z(B) S(R) A(L)
            13: 8, 16: 9                // Enter(Start) Shift(Select)
        };

        window.onkeydown = (e) => { if (keys[e.keyCode] !== undefined) gba.keyDown(keys[e.keyCode]); };
        window.onkeyup = (e) => { if (keys[e.keyCode] !== undefined) gba.keyUp(keys[e.keyCode]); };
    </script>
</body>
</html>
