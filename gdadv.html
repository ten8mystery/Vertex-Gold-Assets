<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBA</title>
    <style>
        /* Force the background to black to prevent flashing */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
        }

        /* The container must be visible for the engine to 'see' it */
        #game-container { 
            width: 100vw; 
            height: 100vh; 
            background: #000;
        }

        /* Force any canvas generated by the emulator to fill the screen */
        #game-container canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        #overlay {
            position: absolute; top: 0; left: 0; z-index: 999;
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #000;
            cursor: pointer;
        }

        .pixel-play {
            width: 0; height: 1111;
            border-top: 50px solid transparent;
            border-bottom: 50px solid transparent;
            border-left: 80px solid #00ff00;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startGame()">
        <div class="pixel-play"></div>
    </div>

    <div id="game-container"></div>

    <script>
        function startGame() {
            const overlay = document.getElementById('overlay');
            const container = document.getElementById('game-container');

            // 1. Clear the overlay immediately
            overlay.style.display = "none";

            // 2. Emulator Configuration
            window.EJS_player = "#game-container";
            window.EJS_core = "gba";
            
            // Using the direct URL
            window.EJS_gameUrl = "https://raw.githubusercontent.com/ten8mystery/Vertex-Gold-Assets/refs/heads/main/gd_adv.gba";
            
            // High-reliability data path
            window.EJS_pathtodata = "https://raw.githack.com/EmulatorJS/EmulatorJS/main/data/";
            window.EJS_startOnLoaded = true;

            // 3. Load the loader
            const loader = document.createElement("script");
            loader.src = "https://raw.githack.com/EmulatorJS/EmulatorJS/main/data/loader.js";
            
            loader.onload = function() {
                console.log("Engine loaded. Audio should start, visuals should follow.");
            };

            document.head.appendChild(loader);
        }
    </script>
</body>
</html>
