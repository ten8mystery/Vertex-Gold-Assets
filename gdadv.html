<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBA Play</title>
    <style>
        /* Essential fullscreen styling, keeping background pitch black */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        /* The Game Container (invisible until game loads) */
        #game-container { 
            width: 100vw; 
            height: 100vh; 
            display: none; /* Hidden initially */
            z-index: 1;
        }

        /* The Overlay containing only the button */
        #overlay {
            position: absolute;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* The ONLY element: A Green Pixel Play Button
         No text, just a classic, solid green right-facing triangle.
        */
        .pixel-play-button {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            
            /* Define size */
            width: 100px;
            height: 100px;

            /* Visual details */
            opacity: 0.8; /* Subtle transparency */
            transition: transform 0.1s ease, opacity 0.2s ease;
            filter: drop-shadow(0 0 10px rgba(0, 255, 0, 0.5)); /* Slight green glow */
        }

        /* Hover effect: Full opacity and slight scale up */
        .pixel-play-button:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* Active effect: Slight scale down and increased glow */
        .pixel-play-button:active {
            transform: scale(0.95);
            filter: drop-shadow(0 0 20px rgba(0, 255, 0, 0.9));
        }

        /* Loading state for the button */
        .pixel-play-button.loading {
            animation: pulse 1s infinite alternate;
            pointer-events: none;
        }

        /* Simple pulsing animation for loading state */
        @keyframes pulse {
            from { opacity: 0.3; }
            to { opacity: 1; }
        }

    </style>
</head>
<body>

    <div id="overlay">
        <button class="pixel-play-button" id="start-button">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/1999/xlink">
                <polygon points="20,10 80,50 20,90" fill="#00ff00"/>
            </svg>
        </button>
    </div>

    <div id="game-container"></div>

    <script>
        const startBtn = document.getElementById('start-button');
        const overlay = document.getElementById('overlay');
        const gameContainer = document.getElementById('game-container');

        startBtn.onclick = function() {
=            startBtn.classList.add('loading');

            window.EJS_player = "#game-container";
            window.EJS_core = "gba"; 
            
            window.EJS_gameUrl = "https://raw.githubusercontent.com/ten8mystery/Vertex-Gold-Assets/refs/heads/main/gd_adv.gba";
            
            window.EJS_pathtodata = "https://raw.githack.com/EmulatorJS/EmulatorJS/main/data/";
            window.EJS_startOnLoaded = true;

            const loader = document.createElement("script");
            loader.src = "https://raw.githack.com/EmulatorJS/EmulatorJS/main/data/loader.js";
            
            loader.onload = () => {
                // When the engine is ready, show the game container
                gameContainer.style.display = "block";
                
                // Hide the overlay completely
                overlay.style.display = "none";
            };

            loader.onerror = () => {
                console.error("Critical Error: GBA Emulator core could not be loaded.");
                startBtn.classList.remove('loading'); // Stop animation on error
            };
            
            document.head.appendChild(loader);
        };
    </script>
</body>
</html>
